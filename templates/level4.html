<!DOCTYPE html>
<html>
<head>
    <title>Level 4 - CodeQuest</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>Level 4 🔥</h1>
    <h3>Score: {{ score }}</h3>

    <p><b>Question:</b> Write Python code to print numbers from 1 to 3</p>

    <form method="POST">
        <textarea name="code" rows="6" placeholder="Write your code here..."></textarea><br>
        <button type="submit">Submit</button>
    </form>

    {% if result == "level4_correct" %}
        <h2>Correct 🎉</h2>
        <a href="/level5">
            <button>Final Level 🐞</button>
        </a>
    {% elif result == "wrong" %}
        <h2>Wrong ❌ Try Again</h2>
    {% endif %}

</div>

</body>
</html>
